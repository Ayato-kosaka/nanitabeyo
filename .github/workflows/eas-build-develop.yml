name: EAS Build Develop

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile to use"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: "Platform to build for"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      wait:
        description: "Wait for build completion"
        required: false
        default: false
        type: boolean
      clear_cache:
        description: "Clear build cache"
        required: false
        default: false
        type: boolean

jobs:
  eas-build:
    name: EAS Build (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-expo

    steps:
      - name: ⏬ Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📥 Cache Turbo
        uses: actions/cache@v3
        with:
          path: |
            .turbo
            node_modules/.cache
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: 🏗 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Run EAS build
        run: |
          WAIT_FLAG=""
          CACHE_FLAG=""

          if [ "${{ github.event.inputs.wait }}" = "true" ]; then
            WAIT_FLAG=""
          else
            WAIT_FLAG="--no-wait"
          fi

          if [ "${{ github.event.inputs.clear_cache }}" = "true" ]; then
            CACHE_FLAG="--clear-cache"
          fi

          pnpx eas-cli build \
            --profile ${{ github.event.inputs.profile }} \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive \
            $WAIT_FLAG \
            $CACHE_FLAG
