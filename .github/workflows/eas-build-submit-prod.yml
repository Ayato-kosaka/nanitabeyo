name: EAS Build Submit Prod

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile to use"
        required: true
        default: "production"
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: "Platform to build for"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      wait:
        description: "Wait for build completion"
        required: false
        default: false
        type: boolean
      auto_submit:
        description: "Automatically submit to app stores"
        required: false
        default: true
        type: boolean
      update_commit_id:
        description: "Update EXPO_PUBLIC_COMMIT_ID environment variable"
        required: false
        default: true
        type: boolean
  # push:
  # branches:
  #   - "release/**"

jobs:
  build-submit-prod:
    name: EAS Build and Submit (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app-expo

    steps:
      - name: ⏬ Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 10.8.0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: ✨ Update environment variable
        if: ${{ github.event.inputs.update_commit_id == 'true' }}
        run: |
          pnpx eas-cli env:update \
            --variable-name EXPO_PUBLIC_COMMIT_ID \
            --value ${{ github.sha }} \
            --non-interactive

      - name: 🚀 Build and Submit App
        run: |
          WAIT_FLAG=""
          SUBMIT_FLAG=""

          if [ "${{ github.event.inputs.wait }}" = "true" ]; then
            WAIT_FLAG=""
          else
            WAIT_FLAG="--no-wait"
          fi

          if [ "${{ github.event.inputs.auto_submit }}" = "true" ]; then
            SUBMIT_FLAG="--auto-submit"
          fi

          pnpx eas-cli build \
            --profile ${{ github.event.inputs.profile }} \
            --platform ${{ github.event.inputs.platform }} \
            --non-interactive \
            $WAIT_FLAG \
            $SUBMIT_FLAG
